
<!DOCTYPE html>
<html>
<head>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ 
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose',
    });
  </script>
</head>
<body>
  <div class="mermaid">
    flowchart TD
        A[User Uploads Image] --> B[Image Saved to Directory]
        B --> C[Model Predict Function Called]
        C --> D[Image Loaded and Preprocessed]
        D --> E[Prediction Executed via TensorFlow Model]
        E --> F[Prediction Index Mapped to Disease Label]
        F --> G[Result Displayed in UI]
  </div>
</body>
</html>
